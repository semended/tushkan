<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Каталог задач — Олимпиадная математика</title>
  <style>
    :root{
      --bg:#0b0c10;
      --card:#11131a;
      --muted:#9aa3b2;
      --text:#e9eef7;
      --line:#232635;
      --accent:#7c5cff;
      --accent2:#2ee59d;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --r:18px;
      --w:1080px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 600px at 30% -10%, rgba(124,92,255,.18), transparent 70%),
                  radial-gradient(900px 500px at 80% 10%, rgba(46,229,157,.12), transparent 70%),
                  var(--bg);
      color:var(--text);
      line-height:1.35;
    }
    a{color:inherit;text-decoration:none}
    .wrap{max-width:var(--w); margin:0 auto; padding:0 18px}
    .top{
      position:sticky; top:0;
      backdrop-filter: blur(10px);
      background: rgba(11,12,16,.65);
      border-bottom:1px solid rgba(35,38,53,.8);
      z-index:50;
    }
    .row{
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 0; gap:12px; flex-wrap:wrap;
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:800}
    .dot{
      width:10px;height:10px;border-radius:99px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 0 4px rgba(124,92,255,.12);
    }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap:8px; padding:10px 12px;
      border:1px solid rgba(35,38,53,.9);
      background: rgba(17,19,26,.6);
      border-radius: 12px;
      cursor:pointer;
      transition:.15s ease;
      user-select:none;
      font-weight:650;
      font-size:14px;
    }
    .btn:hover{transform: translateY(-1px); border-color: rgba(124,92,255,.55)}
    .btn.primary{
      background: linear-gradient(135deg, rgba(124,92,255,.95), rgba(46,229,157,.85));
      border:0;
      color:#0b0c10;
      box-shadow: 0 12px 30px rgba(124,92,255,.18);
    }
    .card{
      background: rgba(17,19,26,.72);
      border:1px solid rgba(35,38,53,.9);
      border-radius: var(--r);
      box-shadow: var(--shadow);
    }
    header{padding:22px 0 10px}
    .hero{padding:18px}
    .kicker{
      color:var(--muted);
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:12px;
      margin-bottom:10px;
    }
    h1{margin:0 0 8px;font-size:28px;line-height:1.05}
    .sub{margin:0;color:rgba(233,238,247,.82);font-size:14px;max-width:80ch}
    .panel{padding:18px}
    .filters{
      display:flex; gap:10px; flex-wrap:wrap;
      margin-bottom:12px;
      align-items:center;
    }
    input, select{
      background: rgba(11,12,16,.35);
      border:1px solid rgba(35,38,53,.9);
      color:var(--text);
      border-radius: 12px;
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }
    input::placeholder{color:rgba(154,163,178,.7)}
    .tasks{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
    }
    @media(max-width:900px){ .tasks{grid-template-columns:1fr} }
    .task{padding:14px;display:flex;flex-direction:column;gap:8px}
    .task .name{margin:0;font-weight:900;font-size:14px}
    .tag{
      display:inline-flex;
      padding:6px 8px;
      border-radius:999px;
      border:1px solid rgba(35,38,53,.9);
      background: rgba(11,12,16,.35);
      color:rgba(233,238,247,.78);
      font-size:12px;
      font-weight:650;
    }
    .muted{color:var(--muted)}
    .bottom{margin-top:auto; display:flex; gap:10px; flex-wrap:wrap}
    .hr{height:1px;background:rgba(35,38,53,.85);margin:14px 0}
    .small{font-size:12px;color:rgba(233,238,247,.7)}
  </style>
</head>
<body>
  <div class="top">
    <div class="wrap">
      <div class="row">
        <div class="brand"><span class="dot"></span><span>Олимпиадная математика</span></div>
        <div style="display:flex; gap:10px; flex-wrap:wrap">
          <a class="btn" href="index.html">← Главная</a>
          <a class="btn" href="index.html#courses">Курсы</a>
          <a class="btn primary" href="#" id="buyBtn">Купить</a>
        </div>
      </div>
    </div>
  </div>

  <header>
    <div class="wrap">
      <div class="card hero">
        <div class="kicker">каталог</div>
        <h1>Каталог задач</h1>
        <p class="sub">Поиск + фильтры. “Открыть” ведёт на страницу задачи <span class="tag">task.html?id=…</span>.</p>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="card panel">
        <div class="filters">
          <input id="q" placeholder="Поиск: ФСУ, делимость, графы..." />
          <select id="grade">
            <option value="">Класс: любой</option>
            <option value="6-7">6–7</option>
            <option value="8-9">8–9</option>
            <option value="10-11">10–11</option>
          </select>
          <select id="topic">
            <option value="">Тема: любая</option>
            <option value="ФСУ">ФСУ</option>
            <option value="Делимость">Делимость</option>
            <option value="Комбинаторика">Комбинаторика</option>
            <option value="Графы">Графы</option>
            <option value="Алгебра">Алгебра</option>
          </select>
          <select id="level">
            <option value="">Сложность: любая</option>
            <option value="easy">easy</option>
            <option value="normal">normal</option>
            <option value="hard">hard</option>
          </select>
          <button class="btn" id="reset">Сброс</button>
        </div>

        <div class="tasks" id="tasksGrid"></div>

        <div class="hr"></div>
        <div class="small">
          Пока это офлайн-демо. Потом доступ к “решениям” можно закрыть через ЛК/оплату.
        </div>
      </div>
    </div>
  </main>

  <script>
    // Заглушки ссылок
    const LINKS = { PAY: "#", LK: "#" };
    document.getElementById('buyBtn').href = LINKS.PAY;

    // Данные задач
    const TASKS = [
      { id: 1, name: "ФСУ-1. Схлопнуть выражение до константы", topic: "ФСУ", grade: "8-9", level: "normal", free: true },
      { id: 2, name: "ФСУ-2. Произведение скобок = разложенный куб", topic: "ФСУ", grade: "8-9", level: "hard", free: false },
      { id: 3, name: "Делимость-1. Остатки и разность степеней", topic: "Делимость", grade: "8-9", level: "normal", free: true },
      { id: 4, name: "Комбинаторика-1. Инвариант/процесс", topic: "Комбинаторика", grade: "6-7", level: "normal", free: true },
      { id: 5, name: "Графы-1. Циклы и ломающее множество", topic: "Графы", grade: "10-11", level: "hard", free: false },
      { id: 6, name: "Алгебра-1. Разложение и красивые ответы", topic: "Алгебра", grade: "8-9", level: "easy", free: true },
      { id: 7, name: "ФСУ-3. Длинная дробь, всё сокращается", topic: "ФСУ", grade: "8-9", level: "normal", free: false },
      { id: 8, name: "Делимость-2. Сумма/разность кубов", topic: "Делимость", grade: "8-9", level: "easy", free: true },
      { id: 9, name: "Комбинаторика-2. Подсчёт через дополнение", topic: "Комбинаторика", grade: "8-9", level: "normal", free: false },
    ];

    const els = {
      q: document.getElementById('q'),
      grade: document.getElementById('grade'),
      topic: document.getElementById('topic'),
      level: document.getElementById('level'),
      reset: document.getElementById('reset'),
      grid: document.getElementById('tasksGrid')
    };

    function render(list){
      els.grid.innerHTML = "";
      if(!list.length){
        els.grid.innerHTML = `<div class="muted">Ничего не найдено. Сбрось фильтры.</div>`;
        return;
      }
      for(const t of list){
        const card = document.createElement('div');
        card.className = "card task";
        card.innerHTML = `
          <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
            <p class="name">${t.name}</p>
            <span class="tag">${t.level}</span>
          </div>
          <div class="muted" style="font-size:13px">
            <span class="tag">${t.topic}</span>
            <span class="tag">${t.grade}</span>
            ${t.free ? `<span class="tag">free</span>` : `<span class="tag">paid</span>`}
          </div>
          <div class="bottom">
            <a class="btn" href="task.html?id=${t.id}">Открыть</a>
            <a class="btn primary" href="${t.free ? 'task.html?id=' + t.id : LINKS.PAY}">
              ${t.free ? "Смотреть" : "Купить доступ"}
            </a>
          </div>
        `;
        els.grid.appendChild(card);
      }
    }

    function apply(){
      const q = (els.q.value || "").trim().toLowerCase();
      const grade = els.grade.value;
      const topic = els.topic.value;
      const level = els.level.value;

      const filtered = TASKS.filter(t => {
        if(grade && t.grade !== grade) return false;
        if(topic && t.topic !== topic) return false;
        if(level && t.level !== level) return false;
        if(q){
          const hay = (t.name + " " + t.topic + " " + t.grade + " " + t.level).toLowerCase();
          if(!hay.includes(q)) return false;
        }
        return true;
      });
      render(filtered);
    }

    els.q.addEventListener('input', apply);
    els.grade.addEventListener('change', apply);
    els.topic.addEventListener('change', apply);
    els.level.addEventListener('change', apply);
    els.reset.addEventListener('click', () => {
      els.q.value = "";
      els.grade.value = "";
      els.topic.value = "";
      els.level.value = "";
      apply();
    });

    render(TASKS);
  </script>
</body>
</html>
